<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D list</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        
        .list{
            justify-items: center;
            align-items: center;
            
        }
        body{
            margin: 100px 100px;
        }
        ul{
            width: 100%;
            height: 100%;
            font-size: 20px;
            font-style: normal;
            background-color: #9489f5;
            color: rgb(40, 91, 230);
            justify-items: center;
            text-align: center;
            box-sizing: border-box;
        }
        .box{
            margin-top: 300px;
            margin-left: 200px;   
        }
        .cube {
            position: relative;
            width: 250px;
            height: 80px;
            margin: 0px auto;
            transform-style: preserve-3d;
            transition: transform 4s;
        }
        .cube-face {
            position: absolute;
            width: 250px;
            height: 80px;
            background-size: 250px 80px;
            background-position: center;
            transition: background-position 1s;
        }
        .cube-face.cube-face-top,.cube-face.cube-face-bottom {
            width: 250px;
            height: 250px;
        }
        .cube-face-top {
            transform: translateY(-85px) rotateX(90deg);
        }
        .cube-face-front {
            transform: translateZ(125px);
        }
        .cube-face-back {
            transform: translateZ(-125px) rotateY(180deg);
        }
        
        .cube-face-left {
            transform: translateX(-125px) rotateY(-90deg);
        }
        .cube-face-right {
            transform: translateX(125px) rotateY(90deg);
        }
        .cube-face-bottom {
            transform: translateY(-45px) rotateX(-90deg);
        }
        .cube:hover {
            transform: rotateX(180deg) rotateY(180deg);
        }
        .cube:hover .cube-face-top {
            background-position: left bottom;
        }
        .cube:hover .cube-face-bottom {
            background-position: right top;
        }
        .cube:hover .cube-face-front {
            background-position: right bottom;
        }
        .cube:hover .cube-face-back {
            background-position: left top;
        }
        
        .cube:hover .cube-face-left {
            background-position: right top;
        }
        
        .cube:hover .cube-face-right {
            background-position: left bottom;
        }
    </style>
</head>
<body>
    <div class="box cube">
        <div class="list cube-face cube-face-front">
            <ul>Home</ul>
        </div>
        <div class="list cube-face cube-face-back">
            <ul>back</ul>
        </div>
        <div class="list cube-face cube-face-left">
            <ul>left</ul>
        </div>
        <div class="list cube-face cube-face-right">
            <ul>right</ul>
        </div>
        <div class="list cube-face cube-face-top">
            <ul>top</ul>
        </div>
        <div class="list cube-face cube-face-bottom">
            <ul>bottom</ul>
        </div>
    </div>
    <div class="box cube">
        <div class="list cube-face cube-face-front">
            <ul>About</ul>
        </div>
        <div class="list cube-face cube-face-back">

        <div class="list cube-face cube-face-left">

        </div>
        <div class="list cube-face cube-face-right">
            <ul>right</ul>
        </div>
        <div class="list cube-face cube-face-top">
            <ul>top</ul>
        </div>
        <div class="list cube-face cube-face-bottom">
            <ul>bottom</ul>
        </div>
    </div>
    <div class="box cube">
        <div class="list cube-face cube-face-front">
            <ul>Clients</ul>
        </div>
        <div class="list cube-face cube-face-back">
            <ul>back</ul>
        </div>
        <div class="list cube-face cube-face-left">
            <ul>left</ul>
        </div>
        <div class="list cube-face cube-face-right">
            <ul>right</ul>
        </div>
        <div class="list cube-face cube-face-top">
            <ul>top</ul>
        </div>
        <div class="list cube-face cube-face-bottom">
            <ul>bottom</ul>
        </div>
    </div>
    <div class="box cube">
        <div class="list cube-face cube-face-front">
            <ul>Work</ul>
        </div>
        <div class="list cube-face cube-face-back">
            <ul>back</ul>
        </div>
        <div class="list cube-face cube-face-left">
            <ul>left</ul>
        </div>
        <div class="list cube-face cube-face-right">
            <ul>right</ul>
        </div>
        <div class="list cube-face cube-face-top">
            <ul>top</ul>
        </div>
        <div class="list cube-face cube-face-bottom">
            <ul>bottom</ul>

</body>
</html>
