<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
<style>
    *{
        margin: 0;
        padding: 0;
        
    }
    .box{
        width: 500px;
        height: 300px;
        background-color: rgb(239, 194, 239);
        border-top-left-radius: 10px;
        margin: 20px;  
    }
    h2{
        font-weight: bold;
        color: rgb(234, 131, 234);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px; 
    }
    .input-container {
        display: inline-flex;
        flex-direction: column; 
        align-items: flex-start;
        padding-left: 100px;
        margin-bottom: 20px;        
    }
    .bar{
        margin-bottom: 10px;
        border-radius: 3px;
        border: transparent;
        outline: transparent;
        color: rgb(68, 7, 101);
        width: 300px;
        height: 40px;
        
    }
    .bar::placeholder{
        color: rgb(188, 187, 187);
    }
    .login{
        width: 80px;
        height: 30px;
        background-color: rgb(252, 249, 252);
        color: gray;
        outline: transparent;
        border: transparent;
        border-radius: 5px;
        box-shadow: -3px 3px 4px #f697f8;    
    }
    .login-box{
        margin-left: 100px;
        margin-top: -10px;
    }
    a{
        text-decoration: none;
        color: gray;
    }
    .a-box{
        margin-left: 300px;
        font-size: 12px;
        margin-bottom: 50px;
    }

</style>
</head>
<body>
    <div class="box">
        <h2>Login Information</h2>
        <div class="input-container">
            <label for="username"></label>
            <input type="text" class="bar" id="username" name="username" placeholder="Enter Username">
        <label for="password"></label>
        <input type="text" class="bar" id="Password" name="password" placeholder="Enter Password">
        </div>
    
        <div class="login-box">
            <input class="login" type="submit" value="Login">
        </div>

        <div class="a-box">
            <a href="">Forgot your password?</a>
        </div>

    </div>
    
</body>
</html>
